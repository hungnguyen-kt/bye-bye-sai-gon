<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.2) 0%, transparent 50%);
      animation: float 20s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }

      33% {
        transform: translate(30px, -30px) rotate(120deg);
      }

      66% {
        transform: translate(-20px, 20px) rotate(240deg);
      }
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px 30px;
      border-radius: 30px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
      text-align: center;
      width: 100%;
      max-width: 500px;
      position: relative;
      z-index: 1;
    }

    h1 {
      color: #fff;
      margin-bottom: 40px;
      font-size: 1.4em;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .countdown-main {
      margin: 30px 0;
    }

    .total-seconds {
      font-size: 4em;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
      text-shadow: 0 0 30px rgba(138, 43, 226, 0.6);
      animation: pulse 2s ease-in-out infinite;
      line-height: 1.2;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.02);
        opacity: 0.95;
      }
    }

    .seconds-label {
      font-size: 1em;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 300;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      margin: 30px 0;
    }

    .breakdown {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 30px;
    }

    .time-block {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 20px 15px;
      transition: all 0.3s ease;
    }

    .time-block:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(138, 43, 226, 0.2);
    }

    .time-value {
      font-size: 2.5em;
      font-weight: 700;
      color: #fff;
      display: block;
      margin-bottom: 5px;
      text-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
    }

    .time-label {
      font-size: 0.75em;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 400;
    }

    .target-date {
      margin-top: 30px;
      font-size: 0.9em;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 1px;
    }

    .fullscreen-hint {
      margin-top: 20px;
      font-size: 0.8em;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 1px;
    }

    .fullscreen-hint kbd {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 5px;
      padding: 3px 8px;
      font-family: monospace;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.9em;
    }

    /* Tablet and larger */
    @media (min-width: 768px) {
      .container {
        padding: 60px 50px;
        max-width: 700px;
      }

      h1 {
        font-size: 1.8em;
        margin-bottom: 50px;
      }

      .total-seconds {
        font-size: 6em;
        margin-bottom: 15px;
      }

      .seconds-label {
        font-size: 1.1em;
      }

      .breakdown {
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
      }

      .time-block {
        padding: 25px 20px;
      }

      .time-value {
        font-size: 3em;
      }

      .time-label {
        font-size: 0.8em;
      }

      .target-date {
        font-size: 1em;
        margin-top: 40px;
      }

      .fullscreen-hint {
        font-size: 0.85em;
        margin-top: 15px;
      }
    }

    /* Small mobile optimization */
    @media (max-width: 400px) {
      .total-seconds {
        font-size: 3em;
      }

      .time-value {
        font-size: 2em;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>⏳ Countdown Timer</h1>

    <div class="countdown-main">
      <div class="total-seconds" id="totalSeconds">0</div>
      <div class="seconds-label">Seconds Remaining</div>
    </div>

    <div class="divider"></div>

    <div class="breakdown">
      <div class="time-block">
        <span class="time-value" id="days">0</span>
        <span class="time-label">Days</span>
      </div>
      <div class="time-block">
        <span class="time-value" id="hours">0</span>
        <span class="time-label">Hours</span>
      </div>
      <div class="time-block">
        <span class="time-value" id="minutes">0</span>
        <span class="time-label">Minutes</span>
      </div>
      <div class="time-block">
        <span class="time-value" id="seconds">0</span>
        <span class="time-label">Seconds</span>
      </div>
    </div>

    <div class="target-date">Until Web, July 01, 2026</div>

    <div class="fullscreen-hint">Press <kbd>F</kbd> for fullscreen</div>
  </div>

  <script>
    const endDate = new Date('2026-07-01T23:59:59');

    function calculateRemainingSeconds() {
      const now = new Date();
      const diff = endDate - now;
      return Math.max(0, Math.floor(diff / 1000));
    }

    function updateDisplay() {
      const remainingSeconds = calculateRemainingSeconds();
      const days = Math.floor(remainingSeconds / 86400);
      const hours = Math.floor((remainingSeconds % 86400) / 3600);
      const minutes = Math.floor((remainingSeconds % 3600) / 60);
      const seconds = remainingSeconds % 60;

      document.getElementById('totalSeconds').textContent = remainingSeconds.toLocaleString();
      document.getElementById('days').textContent = days;
      document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
      document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
      document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');

      if (remainingSeconds === 0) {
        alert('Countdown finished! It\'s July 01, 2026!');
      }
    }

    updateDisplay();
    setInterval(updateDisplay, 1000);

    // Fullscreen toggle with F key
    document.addEventListener('keydown', function (e) {
      if (e.key === 'f' || e.key === 'F') {
        toggleFullscreen();
      }
    });

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          console.log('Error attempting to enable fullscreen:', err);
        });
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
      }
    }
  </script>
</body>

</html>
